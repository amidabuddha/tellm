name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  gate:
    # The same gate AGENTS.md requires before every commit, on every
    # platform tellm ships for — the keychain stores are cfg-gated per
    # platform and only compile on their own OS.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - run: rustup update stable && rustup default stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked

  msrv:
    # Prove the declared rust-version floor actually builds and passes
    # tests. Build + test only: fmt and clippy output drift across
    # toolchains and would fail spuriously on an old one.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          msrv=$(grep -m1 '^rust-version' Cargo.toml | cut -d'"' -f2)
          rustup toolchain install "$msrv" --profile minimal
          rustup default "$msrv"
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --locked
